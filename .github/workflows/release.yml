name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.2)'
        required: true
      changelog:
        description: 'Changelog / release notes'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Java 8
        uses: actions/setup-java@v4.7.0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject version into build.gradle
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          echo "=== Version injection ==="
          echo "Target version: $INPUT_VERSION"
          OLD=$(grep "^version = " build.gradle)
          echo "Before: $OLD"
          sed -i "s/^version = '.*'/version = '$INPUT_VERSION'/" build.gradle
          NEW=$(grep "^version = " build.gradle)
          echo "After:  $NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "ERROR: version was not changed (old and new are identical)" >&2
            exit 1
          fi
          echo "Version successfully injected into build.gradle"
          echo "plugin.yml will receive version via Gradle processResources (placeholder: \${version})"

      - name: Build JAR
        run: gradle build --no-daemon

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.changelog }}
          files: build/libs/amethystads-plugin.jar
